<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito | Privilegio Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f1ea;
      --surface: rgba(255, 252, 247, 0.78);
      --ink: #1f1a17;
      --muted: #756b64;
      --line: rgba(65, 54, 46, 0.12);
      --accent: #b7925d;
      --shadow: 0 24px 70px rgba(52, 41, 30, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
    }

    body {
      font-family: "Manrope", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(183, 146, 93, 0.15), transparent 22%),
        linear-gradient(180deg, #f8f4ee 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    .eyebrow {
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
      font-size: 0.76rem;
    }

    .display-serif,
    .panel-title {
      font-family: "Cormorant Garamond", serif;
    }

    .display-serif {
      font-size: clamp(2.7rem, 5vw, 4.2rem);
      line-height: 0.95;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .shell,
    .panel,
    .summary-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--surface);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .shell {
      overflow: hidden;
      background: linear-gradient(135deg, rgba(255, 252, 247, 0.88), rgba(247, 241, 231, 0.78));
    }

    .panel-title {
      font-size: 2rem;
      line-height: 1;
    }

    .cart-badge {
      min-width: 92px;
      text-align: center;
      border-radius: 999px;
      background: #efe4d3;
      color: #8b6a3f;
      padding: 0.55rem 0.85rem;
      font-weight: 700;
    }

    .premium-input,
    .premium-btn,
    .premium-btn-outline {
      border-radius: 999px;
      min-height: 52px;
    }

    .premium-input {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.7);
      padding-inline: 1rem;
    }

    .premium-input:focus {
      border-color: rgba(183, 146, 93, 0.5);
      box-shadow: 0 0 0 0.2rem rgba(183, 146, 93, 0.14);
    }

    .premium-btn {
      border: 0;
      background: linear-gradient(135deg, var(--ink), #39322e);
      color: #f9f5ef;
      font-weight: 600;
    }

    .premium-btn:hover {
      opacity: 0.96;
    }

    .premium-btn-outline {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
    }

    .premium-btn-outline:hover {
      background: rgba(255, 255, 255, 0.65);
    }

    .cart-row + .cart-row {
      border-top: 1px solid var(--line);
    }

    .summary-card {
      background: rgba(255, 255, 255, 0.44);
      border-radius: var(--radius-lg);
    }

    .result-box {
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div class="container py-4 py-lg-5">
    <section class="shell p-4 p-lg-5 mb-4 mb-lg-5">
      <div class="d-flex flex-wrap justify-content-between align-items-end gap-3">
        <div>
          <div class="eyebrow mb-3">Checkout</div>
          <h1 class="display-serif mb-2">Tu seleccion final.</h1>
          <p class="text-muted mb-0">Ajusta cantidades, confirma tu correo y registra la compra.</p>
        </div>
        <a href="{% url 'home' %}" class="btn premium-btn-outline px-4">Seguir comprando</a>
      </div>
    </section>

    <div class="row g-4 g-xl-5">
      <div class="col-lg-8">
        <section class="panel p-4">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
              <div class="eyebrow mb-2">Carrito</div>
              <h2 class="panel-title mb-0">Productos agregados</h2>
            </div>
            <span id="cart-count" class="cart-badge">0 items</span>
          </div>
          <div id="cart-items">
            <p class="text-muted mb-0">Tu carrito esta vacio.</p>
          </div>
        </section>
      </div>

      <div class="col-lg-4">
        <aside class="panel p-4">
          <div class="eyebrow mb-2">Confirmacion</div>
          <h2 class="panel-title mb-4">Finalizar compra</h2>

          <form id="checkout-form">
            {% csrf_token %}
            <label class="form-label text-muted small" for="customer_email">Correo del cliente</label>
            <input id="customer_email" class="form-control premium-input mb-4" type="email" value="cliente@privilegio.com" required>
          </form>

          <div class="summary-card p-4 mb-3">
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted">Subtotal</span>
              <strong id="cart-subtotal">$ 0.00</strong>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted">IVA (19%)</span>
              <span id="cart-tax">$ 0.00</span>
            </div>
            <div class="d-flex justify-content-between fs-5 fw-semibold">
              <span>Total</span>
              <span id="cart-total">$ 0.00</span>
            </div>
          </div>

          <div class="d-grid gap-2">
            <button id="checkout-button" class="btn premium-btn btn-lg" type="button">Completar compra</button>
            <button id="clear-cart-button" class="btn premium-btn-outline" type="button">Vaciar carrito</button>
          </div>

          <div id="result" class="alert d-none mt-3 mb-0 result-box" role="alert"></div>
        </aside>
      </div>
    </div>
  </div>

  <script>
    const CART_STORAGE_KEY = "privilegio-cart";
    const csrfTokenInput = document.querySelector("input[name=csrfmiddlewaretoken]");

    const cartItemsContainer = document.getElementById("cart-items");
    const cartCount = document.getElementById("cart-count");
    const cartSubtotal = document.getElementById("cart-subtotal");
    const cartTax = document.getElementById("cart-tax");
    const cartTotal = document.getElementById("cart-total");
    const resultBox = document.getElementById("result");
    const customerEmailInput = document.getElementById("customer_email");

    function readCart() {
      const cart = JSON.parse(localStorage.getItem(CART_STORAGE_KEY) || "[]");
      return cart.map((item) => ({
        ...item,
        size: item.size || "M",
        key: item.key || `${item.id}-${item.size || "M"}`,
      }));
    }

    function writeCart(items) {
      localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(items));
    }

    function money(value) {
      return `$ ${Number(value).toFixed(2)}`;
    }

    function showResult(message, type) {
      resultBox.className = `alert alert-${type} mt-3 mb-0 result-box`;
      resultBox.textContent = message;
    }

    function updateQuantity(itemKey, quantity) {
      const cart = readCart();
      const item = cart.find((entry) => entry.key === itemKey);
      if (!item) {
        return;
      }

      if (!quantity || quantity < 1) {
        writeCart(cart.filter((entry) => entry.key !== itemKey));
      } else {
        item.quantity = quantity;
        writeCart(cart);
      }

      renderCart();
    }

    function renderCart() {
      const cart = readCart();

      if (cart.length === 0) {
        cartItemsContainer.innerHTML = '<p class="text-muted mb-0">Tu carrito esta vacio.</p>';
      } else {
        cartItemsContainer.innerHTML = cart.map((item) => `
          <div class="cart-row py-3">
            <div class="row align-items-center g-3">
              <div class="col-sm-6">
                <div class="fw-semibold">${item.name}</div>
                <div class="text-muted small">Talla ${item.size} · ${money(item.price)} c/u</div>
              </div>
              <div class="col-sm-3">
                <input class="form-control premium-input item-quantity" type="number" min="1" value="${item.quantity}" data-item-key="${item.key}">
              </div>
              <div class="col-sm-3 text-sm-end">
                <button class="btn btn-sm text-danger p-0 remove-item" type="button" data-item-key="${item.key}">
                  Eliminar
                </button>
              </div>
            </div>
          </div>
        `).join("");
      }

      const subtotal = cart.reduce((sum, item) => sum + (Number(item.price) * item.quantity), 0);
      const tax = subtotal * 0.19;
      const total = subtotal + tax;
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);

      cartCount.textContent = `${totalItems} items`;
      cartSubtotal.textContent = money(subtotal);
      cartTax.textContent = money(tax);
      cartTotal.textContent = money(total);

      document.querySelectorAll(".item-quantity").forEach((input) => {
        input.addEventListener("change", () => {
          updateQuantity(input.dataset.itemKey, Number(input.value));
        });
      });

      document.querySelectorAll(".remove-item").forEach((button) => {
        button.addEventListener("click", () => {
          updateQuantity(button.dataset.itemKey, 0);
        });
      });
    }

    document.getElementById("clear-cart-button").addEventListener("click", () => {
      writeCart([]);
      renderCart();
      showResult("Carrito vaciado.", "secondary");
    });

    document.getElementById("checkout-button").addEventListener("click", async () => {
      const cart = readCart();
      if (cart.length === 0) {
        showResult("Agrega al menos un producto antes de comprar.", "danger");
        return;
      }

      const customerEmail = customerEmailInput.value.trim();
      if (!customerEmail) {
        showResult("Ingresa un correo valido para continuar.", "danger");
        return;
      }

      const payload = {
        customer_email: customerEmail,
        items: cart.map((item) => ({
          product_id: item.id,
          quantity: item.quantity,
        })),
      };

      try {
        const response = await fetch("/api/carts/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfTokenInput ? csrfTokenInput.value : "",
          },
          body: JSON.stringify(payload),
        });

        const data = await response.json();

        if (!response.ok) {
          showResult(data.error || "No fue posible completar la compra.", "danger");
          return;
        }

        writeCart([]);
        renderCart();
        showResult(`Compra registrada. Pedido #${data.id} por ${money(data.total)}.`, "success");
      } catch (error) {
        showResult(`Error de conexion: ${error}`, "danger");
      }
    });

    renderCart();
  </script>
</body>
</html>
